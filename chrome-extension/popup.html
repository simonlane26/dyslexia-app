<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyslexia Write</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 520px;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .header-subtitle {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 1px;
    }
    .open-app-btn {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .open-app-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Settings bar ── */
    .settings {
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .settings-label {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 36px;
      flex-shrink: 0;
    }
    select.font-select {
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #1e293b;
      background: #f8fafc;
      cursor: pointer;
      flex: 1;
    }
    .size-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .size-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .size-btn:hover { background: #e2e8f0; }
    .size-value {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      min-width: 28px;
      text-align: center;
    }
    .color-swatches {
      display: flex;
      gap: 5px;
    }
    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .swatch:hover, .swatch.active { border-color: #7c3aed; }

    /* ── Editor area ── */
    .editor-wrap {
      flex: 1;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #editor {
      flex: 1;
      width: 100%;
      min-height: 260px;
      resize: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      font-size: 17px;
      line-height: 1.75;
      color: #1e293b;
      background: #fdf6e3;
      outline: none;
      transition: border-color 0.15s;
      font-family: Arial, sans-serif;
    }
    #editor:focus { border-color: #7c3aed; }
    #editor::placeholder { color: #94a3b8; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 10px 12px;
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .toolbar-left {
      display: flex;
      gap: 6px;
    }
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: Arial, sans-serif;
    }
    .tool-btn:hover { background: #e2e8f0; }
    .tool-btn.primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border-color: transparent;
    }
    .tool-btn.primary:hover { opacity: 0.9; }
    .tool-btn.active {
      background: #fef3c7;
      border-color: #f59e0b;
      color: #92400e;
    }
    .tool-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .word-count {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
    }
    .save-status {
      font-size: 11px;
      color: #16a34a;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-status.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Dyslexia Write</div>
      <div class="header-subtitle">Write here. Improve. Use anywhere.</div>
    </div>
    <a class="open-app-btn" href="https://dyslexiawrite.com/app" target="_blank">Open full app ↗</a>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="settings-row">
      <span class="settings-label">Font</span>
      <select class="font-select" id="fontSelect">
        <option value="Arial, Helvetica, sans-serif">Arial</option>
        <option value="Verdana, Tahoma, sans-serif">Verdana</option>
        <option value="'Comic Sans MS', 'Comic Sans', cursive">Comic Sans</option>
        <option value="Georgia, serif">Georgia</option>
      </select>
      <div class="size-controls">
        <button class="size-btn" id="sizeDown">−</button>
        <span class="size-value" id="sizeValue">17</span>
        <button class="size-btn" id="sizeUp">+</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">BG</span>
      <div class="color-swatches">
        <div class="swatch active" data-color="#fdf6e3" style="background:#fdf6e3;" title="Cream"></div>
        <div class="swatch" data-color="#ffffff" style="background:#ffffff; border-color:#e2e8f0;" title="White"></div>
        <div class="swatch" data-color="#e8f4f8" style="background:#e8f4f8;" title="Light blue"></div>
        <div class="swatch" data-color="#f0fdf4" style="background:#f0fdf4;" title="Mint"></div>
        <div class="swatch" data-color="#fff9e6" style="background:#fff9e6;" title="Yellow"></div>
        <div class="swatch" data-color="#1e293b" style="background:#1e293b;" title="Dark"></div>
      </div>
      <span class="save-status" id="saveStatus">Saved ✓</span>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <textarea
      id="editor"
      placeholder="Start writing here... your draft saves automatically."
      spellcheck="true"
    ></textarea>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="tool-btn primary" id="readBtn">🔊 Read aloud</button>
      <button class="tool-btn" id="clearBtn">✕ Clear</button>
    </div>
    <span class="word-count" id="wordCount">0 words</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
